<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-info: #58a6ff;
            --accent-glow: rgba(56, 139, 253, 0.15);
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease-out;
        }

        .icon-container {
            width: 72px;
            height: 72px;
            background-color: var(--accent-glow);
            border: 2px solid var(--accent-info);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            color: var(--accent-info);
        }

            .icon-container svg {
                width: 32px;
                height: 32px;
                stroke-width: 2px;
                transform: translateX(1px);
            }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(56, 139, 253, 0.1);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        .footer-note {
            margin-top: 32px;
            font-size: 12px;
            color: #484f58;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 16px;
                border: none;
                background-color: transparent;
                box-shadow: none;
            }

            body {
                background-color: var(--card-bg);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
            </svg>
        </div>
        <h1>Logged Out</h1>
        <p>Your SSO session has been ended successfully.</p>

        <div class="badge">
            Session Ended
        </div>

        <div class="footer-note">
            You can safely close this browser window or tab now.
        </div>
    </div>
    <script>
            document.addEventListener("DOMContentLoaded", () => { fetch('/loaded').catch(err => console.log('unable to request loaded endpoint')); });
    </script>
</body>
</html>
