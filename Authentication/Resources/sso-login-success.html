<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Successful</title>
        <style>
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --accent-success: #2ea043;
                --accent-glow: rgba(46, 160, 67, 0.15);
                --text-primary: #c9d1d9;
                --text-secondary: #8b949e;
                --border-color: #30363d;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-primary);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
            }

            .card {
                background-color: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 40px 24px;
                max-width: 420px;
                width: 100%;
                text-align: center;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
                animation: fadeIn 0.4s ease-out;
            }

            .icon-container {
                width: 72px;
                height: 72px;
                background-color: var(--accent-glow);
                border: 2px solid var(--accent-success);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 24px auto;
                color: var(--accent-success);
            }

                .icon-container svg {
                    width: 36px;
                    height: 36px;
                    stroke-width: 2.5px;
                }

            h1 {
                font-size: 24px;
                font-weight: 600;
                margin-bottom: 12px;
                letter-spacing: -0.5px;
            }

            p {
                font-size: 15px;
                color: var(--text-secondary);
                line-height: 1.6;
                margin-bottom: 24px;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                background-color: rgba(46, 160, 67, 0.1);
                color: #58a6ff;
                border: 1px solid rgba(88, 166, 255, 0.2);
                padding: 6px 12px;
                border-radius: 20px;
                font-size: 13px;
                font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            }

            .footer-note {
                margin-top: 32px;
                font-size: 12px;
                color: #484f58;
                border-top: 1px solid var(--border-color);
                padding-top: 16px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 480px) {
                .card {
                    padding: 32px 16px;
                    border: none;
                    background-color: transparent;
                    box-shadow: none;
                }

                body {
                    background-color: var(--card-bg);
                }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1>Authenticated Successfully</h1>
            <p>Your identity has been verified, your database download will now begin.</p>

            <div class="badge">
                Secure Connection Verified
            </div>

            <div class="footer-note">
                You can safely close this browser window or tab now.
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", () => { fetch('/loaded').catch(err => console.log('unable to request loaded endpoint')); });
        </script>
    </body>
</html>
